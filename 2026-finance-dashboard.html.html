/************************************************************
 * UTILITIES
 ************************************************************/
let showDetails = false;

function formatCurrency(v) {
  return "$" + (isFinite(v) ? v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",") : "0.00");
}

function feeClass(pct) {
  if (pct >= 10) return "fee-red";
  if (pct >= 8) return "fee-yellow";
  return "fee-green";
}

function calcPayment(principal, apr, termMonths, factor) {
  if (factor) return principal * factor;

  const r = apr / 100 / 12;
  if (r === 0) return principal / termMonths;

  const pow = Math.pow(1 + r, termMonths);
  return principal * (r * pow) / (pow - 1);
}

function calcInterest(principal, payment, apr, termMonths) {
  const r = apr / 100 / 12;
  let bal = principal;
  let total = 0;

  for (let i = 0; i < termMonths; i++) {
    const interest = bal * r;
    const principalPaid = payment - interest;
    bal -= principalPaid;
    total += interest;
    if (bal <= 0) break;
  }
  return Math.max(0, total);
}

function calcMerchantFee(principal, pct) {
  return principal * (pct / 100);
}

/************************************************************
 * AUTO-FINANCED CALC
 ************************************************************/
function updateAutoFinanced() {
  const job = parseFloat(jobCost.value || 0);
  const down = parseFloat(downPayment.value || 0);
  const financed = Math.max(0, job - down);

  autoFinancedDisplay.textContent = formatCurrency(financed);

  if (!financedAmount.value) {
    financedAmount.value = financed.toFixed(2);
  }
}

/************************************************************
 * MAIN CALCULATION ENGINE
 ************************************************************/
function calculatePayments() {
  const principal = parseFloat(financedAmount.value || 0);
  const desiredMonths = (parseInt(desiredYears.value || 0) * 12) + parseInt(desiredMonths.value || 0);

  if (principal <= 0) {
    plansBody.innerHTML = "";
    planCount.textContent = "0 plans";
    top3.innerHTML = "";
    return;
  }

  const results = plans.map(p => {
    const payment = calcPayment(principal, p.apr, p.termMonths || 0, p.paymentFactor);
    const interest = p.termMonths ? calcInterest(principal, payment, p.apr, p.termMonths) : 0;
    const fee = calcMerchantFee(principal, p.merchantFeePct);
    const margin = principal - fee;

    return {
      plan: p,
      payment,
      interest,
      fee,
      margin,
      withinDesired: desiredMonths > 0 ? (p.termMonths ? p.termMonths <= desiredMonths : null) : null
    };
  });

  results.sort((a, b) => a.payment - b.payment);

  renderPlans(results);
  renderTop3(results);
}

/************************************************************
 * RENDERING
 ************************************************************/
function renderPlans(list) {
  plansBody.innerHTML = "";
  planCount.textContent = list.length + " plans";

  list.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td></td>
      <td></td>
      <td>%</td>
      <td> "-"</td>
      <td></td>
      <td class="details-col  "hidden""></td>
      <td class="details-col  "hidden"">
        <span class="fee-chip ">%</span>
      </td>
    `;

    plansBody.appendChild(tr);
  });
}

function renderTop3(list) {
  if (!list.length) {
    top3.innerHTML = "";
    return;
  }

  const bestMargin = [...list].sort((a, b) => b.margin - a.margin)[0];
  const lowestPayment = list[0];
  const fastest = [...list].filter(r => r.plan.termMonths).sort((a, b) => a.plan.termMonths - b.plan.termMonths)[0] || list[0];

  top3.innerHTML = `
    <div><strong>Best Margin:</strong>  – <br>
      Payment:  | Term:  "-"</div><br>

    <div><strong>Lowest Payment:</strong>  – <br>
      Payment:  | Term:  "-"</div><br>

    <div><strong>Fastest Payoff:</strong>  – <br>
      Payment:  | Term:  "-"</div>
  `;
}
